name: Deploy to GitHub Pages

# Build + deploy on every push to main or the experimental branch, plus a
# manual trigger from the Actions tab for re-deploys without a code change.
on:
  push:
    branches: [main, claude/experimental-modifications-XTIu8]
  workflow_dispatch:

# GitHub Pages requires these scopes for the official deploy actions:
#   - contents: read   → checkout the repo
#   - pages: write     → publish to the Pages site
#   - id-token: write  → OIDC auth for deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time. `cancel-in-progress: false`
# means a new push waits for the current run to finish instead of clobbering
# it mid-publish (which can leave the live site in a half-uploaded state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        # vite.config.ts switches `base` to `/damia/` automatically when
        # `command === 'build'`, so the Pages subpath is wired in here.
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Surfaces the live URL as the deployment's clickable link in the
      # Actions UI — handy for "where did this commit land".
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
