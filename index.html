<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Force the browser to revalidate index.html on every visit. The bundled
         JS/CSS keep their long cache headers because Vite hashes their
         filenames (e.g. `index-bbsdaeO5.js`), so a stale-but-valid bundle is
         impossible — only the entry HTML can drift. Without these tags,
         Chrome/Safari were serving a week-old `index.html` that referenced
         a long-gone JS hash, making each new deploy invisible until the
         user manually cleared the cache. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Relative path so the icon resolves correctly under both `/` (dev)
         and `/damia/` (prod GitHub Pages) — `<link>` href starting with `/`
         is NOT rewritten by Vite's base, but a relative path works in both. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- `viewport-fit=cover` is required for `env(safe-area-inset-*)` to
         return non-zero values on iOS (notch / Dynamic Island / home
         indicator). Without it Safari clamps everything to 0 and our
         touch UI sits under the notch. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Damia — TLoD action-RPG isometric web game" />
    <title>Damia</title>
    <style>
      /* Surface the OS safe-area insets as CSS variables so the Pixi UI
         layer can read them via getComputedStyle. iPhone notch / Dynamic
         Island / home indicator need this; Android phones with a gesture
         bar too. Desktop returns 0 across the board. */
      :root {
        --safe-area-top: env(safe-area-inset-top, 0px);
        --safe-area-right: env(safe-area-inset-right, 0px);
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --safe-area-left: env(safe-area-inset-left, 0px);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
        /* Prevent the mobile browser from claiming sustained drags as
           system gestures (scroll, pull-to-refresh, two-finger zoom).
           Without this, Android Chrome fires `pointercancel` after a few
           pixels of movement, which kills both the virtual joystick and
           tap-to-move (the viewport never sees `pointerup`). */
        touch-action: none;
        overscroll-behavior: none;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* Boot loading screen. Painted immediately on page load (before
         any JS runs) so the user sees something happening while the
         12 MB of textures / SFX preloads. Hidden by Game.start() once
         AssetManager.preload() resolves. */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #1a2820;
        color: #eec040;
        font-family: system-ui, -apple-system, sans-serif;
        z-index: 9999;
        transition: opacity 280ms ease, visibility 280ms ease;
      }
      #boot.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #boot-title {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-shadow: 0 0 12px rgba(238, 192, 64, 0.35);
      }
      #boot-bar {
        width: min(340px, 70vw);
        height: 6px;
        background: rgba(160, 128, 80, 0.18);
        border: 1px solid rgba(160, 128, 80, 0.4);
        border-radius: 4px;
        overflow: hidden;
      }
      #boot-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a08050, #eec040);
        transition: width 140ms ease;
      }
      #boot-status {
        font-size: 12px;
        color: #c8b58a;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div id="boot-title">DAMIA</div>
      <div id="boot-bar"><div id="boot-bar-fill"></div></div>
      <div id="boot-status">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
