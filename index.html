<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Relative path so the icon resolves correctly under both `/` (dev)
         and `/damia/` (prod GitHub Pages) — `<link>` href starting with `/`
         is NOT rewritten by Vite's base, but a relative path works in both. -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Damia — TLoD action-RPG isometric web game" />
    <title>Damia</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: system-ui, -apple-system, sans-serif;
        color: #fff;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
